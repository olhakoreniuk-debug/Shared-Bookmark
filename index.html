<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Bookmarks</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header>
      <h1>Shared Bookmarks</h1>
      <p><small>Select a user to view and manage bookmarks.</small></p>
    </header>

    <main id="main">
      <section class="user-select" aria-label="User selection">
        <label for="userSelect">Select user</label>
        <select id="userSelect" name="userSelect">
          <option value="">-- Select a user --</option>
          <!-- Options populated by JS -->
        </select>
      </section>

      <p id="status" role="status" aria-live="polite"></p>

      <section id="bookmarks" aria-label="Bookmarks list"></section>

      <hr />

      <section aria-label="Add bookmark">
        <h2 id="addBookmarkHeading">Add bookmark</h2>

        <form id="bookmarkForm" aria-labelledby="addBookmarkHeading" autocomplete="on">
          <div class="form-field">
            <label for="url">URL</label>
            <input
              id="url" name="url" type="url" required
              inputmode="url" placeholder="https://example.com"
              autocapitalize="none" spellcheck="false"
              aria-describedby="urlHelp" list="urlExamples"
            />
            <small id="urlHelp">Paste a full link starting with https://</small>
          </div>

          <div class="form-field">
            <label for="title">Title</label>
            <input
              id="title" name="title" type="text" required
              minlength="2" maxlength="80" placeholder="Short, clear title"
              aria-describedby="titleHelp"
            />
            <small id="titleHelp">2–80 characters.</small>
          </div>

          <div class="form-field">
            <label for="description">Description</label>
            <textarea
              id="description" name="description" required
              minlength="5" maxlength="280" rows="4"
              placeholder="1–2 sentences about the link"
              aria-describedby="descriptionHelp"
            ></textarea>
            <small id="descriptionHelp">5–280 characters.</small>
          </div>

          <div class="form-actions">
            <button type="submit">Add Bookmark</button>
            <button type="reset">Clear</button>
          </div>
        </form>

        <datalist id="urlExamples">
          <option value="https://developer.mozilla.org/"></option>
          <option value="https://kottke.org/"></option>
          <option value="https://migracode-itp.netlify.app/"></option>
        </datalist>
      </section>
    </main>

    <noscript>This page needs JavaScript enabled to work.</noscript>
    <script type="module" src="./script.js"></script>
  </body>
</html>
